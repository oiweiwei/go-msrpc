name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./msrpc/... ./dcerpc/... ./ssp/... ./ndr/... ./smb2/... ./text/... ./midl/... ./config/...
